name: Build and Release DGTCentaurMods .deb

# Trigger the workflow when a release is published via GitHub web interface
on:
  release:
    types: [published]

  # Allows manual triggering from the Actions tab (useful for testing)
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to create/use for the release (example: 1.0.0)"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    # Required permission to upload files to a release
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: Build the .deb package
        run: make

      - name: Debug - List built files
        run: |
          ls -la releases/ || echo "No .deb files found in releases/!"
          find . -name "*.deb" || true

      - name: Create/Update GitHub Release with .deb
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.tag_name }}
          name: ${{ github.event_name == 'release' && github.event.release.name || github.event.inputs.release_name }}
          files: releases/*.deb
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}